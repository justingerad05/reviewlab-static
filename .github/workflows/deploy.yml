name: Build and Deploy Static Site

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Force Sync Dependencies
        # This fixes the "out of sync" error you saw in the logs 
        # by updating your existing package-lock.json automatically.
        run: npm install --package-lock-only

      - name: Install dependencies
        run: npm install

      - name: Fetch Blogger posts
        run: node fetch.js
        env:
          # We pass these so the purge code inside fetch.js can use them
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Use the Secret where you stored your Account ID
          accountId: ${{ secrets.CLOUDFLARE_ZONE_ID }} 
          projectName: reviewlab
          directory: _site
    
      - name: Ping Google
        run: curl "https://www.google.com/ping?sitemap=https://reviewlab.pages.dev/sitemap.xml"
